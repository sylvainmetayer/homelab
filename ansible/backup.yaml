---
- name: Create backup folder on backup storage box
  hosts: backups
  gather_facts: false
  tasks:
    # Storage Box exposes a restricted shell: use raw + mkdir -p and avoid modules.
    - name: Create backup folder
      ansible.builtin.raw: >-
        mkdir -p /home/{{ backup_storage_box_path }}/{{ item }}
      changed_when: false
      loop: "{{ backup_folders }}"
