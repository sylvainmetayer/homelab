---
services:
  backend:
    image: ghcr.io/fbuchner/meerkat-crm-backend:1.4.1@sha256:0642a596d453db30f4a2b7ddf9d5a2c6bf0a9916ba0f12790c563c1b7130359b
    container_name: meerkat_crm_backend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      - PUID={{ ansible_facts['user_uid'] }}
      - PGID={{ ansible_facts['user_gid'] }}
    volumes:
      - ./data:/app/data
      - ./photos:/app/static/photos
    networks:
      - meerkat_crm
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/fbuchner/meerkat-crm-frontend:1.5.0@sha256:113a194b60057b63cb644920f267ffe378baf5cd5d41d9676c4255d76bf01bba
    container_name: meerkat-frontend
    restart: unless-stopped
    networks:
      - newt
      - meerkat_crm
    depends_on:
      backend:
        condition: service_healthy

networks:
  meerkat_crm:
  newt:
    external: true
