---
services:
  searxng:
    container_name: searxng
    image: searxng/searxng:latest@sha256:96b9f57b506ed7f317f5b5983a0ffee7cbd387842f1248ff8a77e946b621da09
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=https://{{ searxng_domain }}/
    volumes:
      - ./config:/etc/searxng:rw
    networks:
      - newt

networks:
  newt:
    external: true
