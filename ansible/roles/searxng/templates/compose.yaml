---
services:
  searxng:
    container_name: searxng
    image: searxng/searxng:latest@sha256:af9aec5c8fe88767106e8043004a1232d43cabde22869e6355f3a63d26e41351
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=https://{{ searxng_domain }}/
    volumes:
      - ./config:/etc/searxng:rw
    networks:
      - newt

networks:
  newt:
    external: true
