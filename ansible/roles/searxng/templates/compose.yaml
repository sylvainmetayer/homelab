---
services:
  searxng:
    container_name: searxng
    image: searxng/searxng:latest@sha256:a87eb8a2b2b65243c431979938aec37d86534f278f44b8115970212a08c32f23
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=https://{{ searxng_domain }}/
    volumes:
      - ./config:/etc/searxng:rw
    networks:
      - newt

networks:
  newt:
    external: true
