---
services:
  searxng:
    container_name: searxng
    image: searxng/searxng:latest@sha256:42369bef568b0bf17ac464ce1b9b971a79bcf78d7607c2ce083d540daa609eff
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=https://{{ searxng_domain }}/
    volumes:
      - ./config:/etc/searxng:rw
    networks:
      - newt

networks:
  newt:
    external: true
