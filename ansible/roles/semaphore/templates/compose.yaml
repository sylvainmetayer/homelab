---
# https://semaphoreui.com/docs/admin-guide/installation/docker
services:
  postgres:
    container_name: semaphore_postgres
    image: postgres:14@sha256:08114be05b660a5b9919050b5efc7e827c50eafd320f9b720cdafae6d661c5cc
    hostname: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER={{ semaphore_db_user }}
      - POSTGRES_PASSWORD={{ semaphore_db_password }}
      - POSTGRES_DB={{ semaphore_db_name }}
    volumes:
      - semaphore-postgres:/var/lib/postgresql/data
    networks:
      - semaphore-internal

  semaphore:
    container_name: semaphore
    image: ghcr.io/sylvainmetayer/homelab/semaphore:v2.18.25@sha256:387711c4a3ac3344268e24e0c1714bd074abe09874a4885ba35ff826e9dbd113
    environment:
      - SEMAPHORE_PLAYBOOK_PATH= /tmp/semaphore/
      - SEMAPHORE_DB_DIALECT=postgres
      - SEMAPHORE_DB_HOST=postgres
      - SEMAPHORE_DB_PORT=5432
      - SEMAPHORE_DB_USER={{ semaphore_db_user }}
      - SEMAPHORE_DB_PASS={{ semaphore_db_password }}
      - SEMAPHORE_DB={{ semaphore_db_name }}
      - SEMAPHORE_ADMIN_PASSWORD={{ semaphore_admin_password }}
      - SEMAPHORE_ADMIN_NAME={{ semaphore_admin_name }}
      - SEMAPHORE_ADMIN_EMAIL={{ semaphore_admin_email }}
      - SEMAPHORE_ADMIN={{ semaphore_admin }}
      - SEMAPHORE_ACCESS_KEY_ENCRYPTION={{ semaphore_access_key_encryption }}
      - TZ=Europe/Paris
    restart: unless-stopped
    #volumes:
    #  - ./requirements.txt:/etc/semaphore/requirements.txt
    depends_on:
      - postgres
    networks:
      - newt
      - semaphore-internal

networks:
  newt:
    external: true
  semaphore-internal:

volumes:
  semaphore-postgres:
