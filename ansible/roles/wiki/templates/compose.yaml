---
services:
  bookstack:
    container_name: bookstack
    networks:
      - newt    # Réseau externe pour accès Pangolin/Traefik
      - wiki    # Réseau interne pour communication avec la DB
    image: lscr.io/linuxserver/bookstack:26.05.20260608@sha256:e3c387ac44a20fa29abcae8426e3e0d8c88b4ccf95d3c091fd9d96c8d0edcd8e
    environment:
      - PUID={{ ansible_facts['user_uid'] }}
      - PGID={{ ansible_facts['user_gid'] }}
      - TZ=Europe/Paris
      - APP_URL=https://{{ wiki_domain }}
      - DB_HOST=bookstack_db
      - DB_PORT=3306
      - DB_USER=bookstack
      - DB_PASS={{ wiki_db_password }}
      - DB_DATABASE=bookstack
    volumes:
      - ./config:/config
    restart: unless-stopped
    depends_on:
      - bookstack_db

  bookstack_db:
    container_name: bookstack_db
    networks:
      - wiki    # Réseau interne uniquement
    image: lscr.io/linuxserver/mariadb:11.4.12@sha256:ac08dd6cf5fb6699c68e77d8afe454d41ea6aaed163817e43011597a60e8f7f1
    environment:
      - PUID={{ ansible_facts['user_uid'] }}
      - PGID={{ ansible_facts['user_gid'] }}
      - TZ=Europe/Paris
      - MYSQL_ROOT_PASSWORD={{ wiki_db_password }}
      - MYSQL_DATABASE=bookstack
      - MYSQL_USER=bookstack
      - MYSQL_PASSWORD={{ wiki_db_password }}
    volumes:
      - ./db_data:/config
    restart: unless-stopped

networks:
  wiki:      # Réseau interne (créé automatiquement)
  newt:
    external: true  # Réseau créé par le rôle newt
