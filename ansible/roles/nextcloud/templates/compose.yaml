---
services:
  nextcloud:
    restart: unless-stopped
    image: ghcr.io/linuxserver/nextcloud:34.0.0@sha256:c45119f46412aeb1d5c8d7526b004b27fa51180a499ab894fcd1af1acced633c
    container_name: nextcloud
    environment:
      - PUID={{ ansible_facts['user_uid'] }}
      - PGID={{ ansible_facts['user_gid'] }}
      - TZ=Europe/Paris
      # https://github.com/linuxserver/docker-mods/tree/nextcloud-memories
      #- DOCKER_MODS=linuxserver/mods:nextcloud-memories
    volumes:
      - ./config:/config
      - ./data:/data
    networks:
      - newt
      - nextcloud

  db:
    container_name: nextcloud_db
    restart: unless-stopped
    image: mariadb:lts@sha256:b1c7bf836e64ed9406a8984af29509f40089d55cea14b32f12c4726a1f17104b
    environment:
      MYSQL_ROOT_PASSWORD: {{ nextcloud_db_password }}
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: {{ nextcloud_db_password }}
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - nextcloud

  cache:
    restart: unless-stopped
    image: redis:bookworm@sha256:c22af04bb576503bf16b3e34a1fd2fd82de0f765afd866d2e380145e0af30d78
    container_name: nextcloud_redis
    command: redis-server --requirepass {{ nextcloud_redis_password }}
    environment:
      - REDIS_PASSWORD={{ nextcloud_redis_password }}
    volumes:
      - ./redis:/data
    networks:
      - nextcloud

networks:
  nextcloud: {}
  newt:
    external: true
