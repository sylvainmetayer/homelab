---
services:
  crm:
    container_name: monica_v4
    image: monica:4.1.2-apache@sha256:7df7518a7af754003978d81d1c195462a65a74f380081195ebe5b1d92140d6d4
    env_file: .env
    volumes:
      - ./data:/var/www/html/storage
    networks:
      - newt
      - monica
    restart: unless-stopped

  monica_v4_db:
    image: lscr.io/linuxserver/mariadb:11.4.12@sha256:ac08dd6cf5fb6699c68e77d8afe454d41ea6aaed163817e43011597a60e8f7f1
    container_name: monica_v4_db
    networks:
      - monica
    environment:
      - PUID={{ ansible_facts['user_uid'] }}
      - PGID={{ ansible_facts['user_gid'] }}
      - TZ=Europe/Paris
      - MYSQL_ROOT_PASSWORD={{ monica_v4_db_password }}
      - MYSQL_DATABASE=monica
      - MYSQL_USER=monica
      - MYSQL_PASSWORD={{ monica_v4_db_password }}
    volumes:
      - ./db_data:/config
    restart: unless-stopped

networks:
  monica:
  newt:
    external: true
