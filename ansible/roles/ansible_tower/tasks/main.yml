---
- name: Ensure Ansible Tower app folder exists
  loop:
    - "{{ ansible_tower_base_path }}"
  ansible.builtin.file:
    mode: "0755"
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_gid'] }}"

- name: Template compose configuration
  notify: Restart ansible_tower
  ansible.builtin.template:
    src: "templates/compose.yaml"
    dest: "{{ ansible_tower_base_path }}/compose.yaml"
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_gid'] }}"
    mode: "0644"

- name: Make sure ansible_tower service is running
  ansible.builtin.systemd:
    state: started
    daemon_reload: true
    name: dc@ansible-tower
    scope: user
    enabled: true
